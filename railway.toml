[build]
builder = "nixpacks"
buildCommand = "cd backend && composer install --no-dev --optimize-autoloader --no-interaction"

[build.env]
PHP_VERSION = "8.2"

[deploy]
startCommand = "cd backend && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
